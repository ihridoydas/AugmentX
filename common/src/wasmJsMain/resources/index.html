<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AugmentX AR</title>

    <style>
        html, body {
            width: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent !important;
            left: 0;
            top: 0;
        }

        #ComposeTarget {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;

            z-index: 10;
            pointer-events: none;

            background: transparent !important;
            transition: opacity 0.4s ease-in-out;
        }

        #ComposeTarget > * {
            pointer-events: auto;
        }

        /* When AR is active, hide UI by default to show camera */
        body.ar-active #ComposeTarget {
            opacity: 0;
            pointer-events: none;
        }

        /* When user wants to see UI during AR */
        body.ar-active.show-ui #ComposeTarget {
            opacity: 1;
            pointer-events: auto;
        }

        #ARContainer, #ViewerContainer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            width: 100%;
            height: 100dvh;

            z-index: 1;
            display: none;
            overflow: hidden;
            background: transparent;
        }

        #ViewerContainer:not(:empty) {
            display: block !important;
        }

        #LogContainer {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;
            max-height: 80px;

            background: rgba(0,0,0,0.5);
            color: #0f0;

            font-family: monospace;
            font-size: 10px;

            overflow-y: auto;

            z-index: 1000;

            pointer-events: none;

            padding: 5px;
            box-sizing: border-box;
        }

        #BackButton {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9999;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: rgba(0,0,0,0.55);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            display: none;
        }

        /* Background Camera Feed ONLY */
        video:not(#arVideo) {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            object-fit: cover !important;
            z-index: 0 !important;
            margin: 0 !important;
        }

        /* AR Content Video */
        #arVideo {
            display: none;
        }

        canvas.a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            z-index: 1 !important;
            margin: 0 !important;
        }
    </style>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>

<button id="BackButton" onclick="onBackPressed()">
    ← Back
</button>

<div id="LogContainer">
    Initializing...<br>
</div>

<div id="ARContainer"></div>
<div id="ViewerContainer"></div>
<div id="ComposeTarget"></div>

<script>
    // GLOBAL ERROR SUPPRESSOR
    let isStoppingAR = false;
    window.addEventListener('error', (e) => {
        if (isStoppingAR) {
            e.preventDefault();
            e.stopImmediatePropagation();
            return true;
        }
    }, true);

    function screenLog(msg) {
        try {
            const log = document.getElementById("LogContainer");
            if (!log) return;
            log.innerHTML += "> " + msg + "<br>";
            log.scrollTop = log.scrollHeight;
            console.log("LOG: " + msg);
        } catch (e) {
            console.error("screenLog error:", e);
        }
    }

    screenLog("V50 Initializing...");

    function onBackPressed() {
        screenLog("Back pressed");
        if (document.body.classList.contains('ar-active')) {
            document.body.classList.add('show-ui');
        }
        try {
            if (window.kmpBridge && typeof window.kmpBridge.onBackPressed === "function") {
                window.kmpBridge.onBackPressed();
                return;
            }
            if (history.length > 1) {
                history.back();
            }
        } catch (e) {
            console.error("onBackPressed error:", e);
        }
    }

    let arIntervalId = null;

    window.stopARSession = function() {
        if (isStoppingAR) return;
        isStoppingAR = true;
        screenLog("Stopping AR (V50)...");

        if (arIntervalId) {
            clearInterval(arIntervalId);
            arIntervalId = null;
        }

        try {
            document.body.classList.remove("ar-active");
            document.body.classList.remove("show-ui");
            const backBtn = document.getElementById("BackButton");
            if (backBtn) backBtn.style.display = "none";

            // 1. Stop all videos and camera streams
            const videos = document.getElementsByTagName('video');
            for (let i = videos.length - 1; i >= 0; i--) {
                try {
                    const v = videos[i];
                    if (v.srcObject) {
                        const tracks = v.srcObject.getTracks();
                        for(let j=0; j<tracks.length; j++) {
                            try { tracks[j].stop(); } catch(e) {}
                        }
                        v.srcObject = null;
                    }
                    v.pause();
                    if (v.parentNode === document.body) {
                        document.body.removeChild(v);
                    }
                } catch(e) {}
            }

            // 2. Stop MindAR System
            const containers = [document.getElementById("ARContainer"), document.getElementById("ViewerContainer")];
            for (let i = 0; i < containers.length; i++) {
                const c = containers[i];
                if (!c) continue;

                const scene = c.querySelector('a-scene');
                if (scene) {
                    try {
                        if (scene.systems && scene.systems['mindar-image-system']) {
                            scene.systems['mindar-image-system'].stop();
                        }
                        scene.pause();
                    } catch(e) {}
                }
            }

            // 3. Forcefully remove injected elements
            const garbage = document.querySelectorAll('.a-canvas, .mindar-ui-overlay, .mindar-ui-loading, body > video, body > canvas, .a-loader-title');
            for (let i = 0; i < garbage.length; i++) {
                try {
                    const el = garbage[i];
                    if (el.parentNode) el.parentNode.removeChild(el);
                } catch(e) {}
            }

            // 4. Clear containers
            for (let i = 0; i < containers.length; i++) {
                if (containers[i]) {
                    containers[i].style.display = "none";
                    try { containers[i].innerHTML = ""; } catch(e) {}
                }
            }

            document.body.style.backgroundColor = "";
            document.documentElement.style.backgroundColor = "";

            setTimeout(() => {
                isStoppingAR = false;
                screenLog("Cleanup done (V50).");
            }, 500);

        } catch (e) {
            isStoppingAR = false;
            console.error("Stop error:", e);
        }
    };

    window.startARSession = function(mindFile, htmlContent) {
        if (isStoppingAR) {
            screenLog("Waiting for cleanup...");
            setTimeout(() => window.startARSession(mindFile, htmlContent), 200);
            return;
        }

        // Use absolute path for mindFile to ensure it loads
        const fullMindPath = window.location.origin + mindFile;
        screenLog("Starting AR (V50): " + fullMindPath);

        try {
            const containers = [document.getElementById("ARContainer"), document.getElementById("ViewerContainer")];
            for (let i = 0; i < containers.length; i++) {
                if(containers[i]) {
                    containers[i].innerHTML = "";
                    containers[i].style.display = "none";
                }
            }
            const extra = document.querySelectorAll('.a-canvas, .mindar-ui-overlay, body > video, body > canvas');
            for (let i = 0; i < extra.length; i++) {
                try { extra[i].parentNode.removeChild(extra[i]); } catch(e) {}
            }
        } catch(e) {}

        try {
            document.body.classList.add("ar-active");
            document.body.classList.remove("show-ui");
            const backBtn = document.getElementById("BackButton");
            if (backBtn) backBtn.style.display = "block";

            const container = document.getElementById("ARContainer");
            if (container) {
                container.style.display = "block";

                // Modify htmlContent to use fullMindPath and enable scanning UI for debug
                let finalHtml = htmlContent.replace(/imageTargetSrc:\s*[^;]+;/, "imageTargetSrc: " + fullMindPath + "; uiScanning: yes; uiLoading: yes;");
                container.innerHTML = finalHtml;

                const sceneEl = container.querySelector('a-scene');
                if (sceneEl) {
                    sceneEl.addEventListener('arReady', () => {
                        screenLog("MindAR Ready (V50)");
                        setTimeout(() => window.dispatchEvent(new Event('resize')), 200);
                    });
                    sceneEl.addEventListener('arError', (e) => {
                        screenLog("AR Error: " + (e.detail ? e.detail.error : "unknown"));
                    });
                    sceneEl.addEventListener('targetFound', (e) => {
                        screenLog("Found Target: " + (e.detail ? e.detail.targetIndex : "0"));
                        const video = document.getElementById("arVideo");
                        if (video) video.play().catch(err => screenLog("Play failed: " + err.message));
                    });
                    sceneEl.addEventListener('targetLost', () => {
                        screenLog("Lost Target");
                        const video = document.getElementById("arVideo");
                        if (video) video.pause();
                    });
                }
            }
        } catch (e) {
            screenLog("Start Error: " + e.message);
        }

        if (arIntervalId) clearInterval(arIntervalId);
        arIntervalId = setInterval(() => {
            const composeCanvases = document.querySelectorAll('#ComposeTarget canvas');
            for (let i = 0; i < composeCanvases.length; i++) {
                try { composeCanvases[i].style.backgroundColor = "transparent"; } catch(e) {}
            }

            if (document.body.classList.contains('ar-active')) {
                const bgVideos = document.querySelectorAll('video:not(#arVideo)');
                for (let i = 0; i < bgVideos.length; i++) {
                    try {
                        const v = bgVideos[i];
                        v.style.width = "100vw"; v.style.height = "100dvh";
                        v.style.left = "0"; v.style.top = "0";
                        v.style.position = "fixed"; v.style.objectFit = "cover";
                    } catch(e) {}
                }
            }
        }, 500);
    };

    document.addEventListener('click', (e) => {
        if (e.target.id === "BackButton") return;
        if (document.body.classList.contains('ar-active')) {
            if (e.target.closest('#ComposeTarget > *')) return;
            document.body.classList.toggle('show-ui');
            screenLog(document.body.classList.contains('show-ui') ? "UI Shown" : "UI Hidden");
        }
    });
</script>
<script src="common.js"></script>
</body>
</html>
