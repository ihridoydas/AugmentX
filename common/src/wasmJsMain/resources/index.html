<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AugmentX AR</title>

    <style>
        html, body {
            width: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent !important;
            left: 0;
            top: 0;
        }

        #ComposeTarget {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;

            z-index: 10;
            pointer-events: none;

            background: transparent !important;
            transition: opacity 0.4s ease-in-out;
        }

        #ComposeTarget > * {
            pointer-events: auto;
        }

        /* When AR is active, hide UI by default to show camera */
        body.ar-active #ComposeTarget {
            opacity: 0;
            pointer-events: none;
        }

        /* When user wants to see UI during AR */
        body.ar-active.show-ui #ComposeTarget {
            opacity: 1;
            pointer-events: auto;
        }

        #ARContainer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            width: 100%;
            height: 100%;

            z-index: 1;
            display: none;
            overflow: hidden;
        }

        #LogContainer {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;
            max-height: 80px;

            background: rgba(0,0,0,0.5);
            color: #0f0;

            font-family: monospace;
            font-size: 10px;

            overflow-y: auto;

            z-index: 1000;

            pointer-events: none;

            padding: 5px;
            box-sizing: border-box;
        }

        /* NEW: BACK BUTTON */

        #BackButton {
            position: fixed;

            top: 12px;
            left: 12px;

            z-index: 9999;

            padding: 10px 16px;

            border: none;
            border-radius: 8px;

            background: rgba(0,0,0,0.55);
            color: white;

            font-size: 16px;
            font-weight: bold;

            cursor: pointer;

            pointer-events: auto;

            display: none; /* Initially hidden */
        }

        video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;

            width: 100vw !important;
            height: 100dvh !important;

            object-fit: cover !important;

            z-index: 0 !important;
            margin: 0 !important;
        }

        canvas.a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;

            width: 100vw !important;
            height: 100dvh !important;

            z-index: 1 !important;
            margin: 0 !important;
        }
    </style>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>

<body>

<!-- NEW: BACK BUTTON -->
<button id="BackButton" onclick="onBackPressed()">
    ← Back
</button>

<div id="LogContainer">
    V19: Initializing...<br>
</div>

<div id="ARContainer"></div>

<div id="ComposeTarget"></div>

<script>

    function screenLog(msg) {
        const log =
            document.getElementById("LogContainer");

        log.innerHTML +=
            "> " + msg + "<br>";

        log.scrollTop =
            log.scrollHeight;
    }

    /* NEW: BACK HANDLER */

    function onBackPressed() {

        screenLog("Back button pressed");

        // Hide back button when returning from AR
        document.getElementById("BackButton").style.display = "none";

        try {

            if (
                window.kmpBridge &&
                typeof window.kmpBridge.onBackPressed === "function"
            ) {
                window.kmpBridge.onBackPressed();
                return;
            }

        } catch (e) {
            console.error(e);
        }

        if (history.length > 1) {
            history.back();
        }
    }

    // Global click listener to toggle UI visibility during AR

    document.addEventListener('click', (e) => {

        if (e.target.id === "BackButton") {
            return;
        }

        if (document.body.classList.contains('ar-active')) {

            if (e.target.closest('#ComposeTarget > *')) {
                return;
            }

            document.body.classList.toggle('show-ui');

            const isShowing =
                document.body.classList.contains('show-ui');

            screenLog(
                isShowing
                    ? "UI Revealed"
                    : "UI Hidden (Camera Focused)"
            );
        }
    });

    window.startARSession = function(
        mindFile,
        htmlContent
    ) {

        screenLog("V20 startARSession");

        document.body.classList.add("ar-active");
        document.body.classList.remove("show-ui");

        // Show back button when AR starts
        document.getElementById("BackButton").style.display = "block";

        const container =
            document.getElementById("ARContainer");

        container.style.display = "block";
        container.innerHTML = htmlContent;

        const sceneEl =
            container.querySelector('a-scene');

        if (sceneEl) {

            sceneEl.addEventListener(
                'arReady',
                () => {
                    screenLog("MindAR Ready");
                    // Force a resize to fix aspect ratio issues
                    window.dispatchEvent(new Event('resize'));
                }
            );
        }

        setInterval(() => {

            // Fix KMP canvases
            const composeCanvases =
                document.querySelectorAll(
                    '#ComposeTarget canvas'
                );

            composeCanvases.forEach(c => {
                c.style.backgroundColor =
                    "transparent";
            });

            // Fix AR canvases and videos
            const arElements =
                document.querySelectorAll(
                    'video, .a-canvas'
                );

            arElements.forEach(el => {
                el.style.width = "100vw";
                el.style.height = "100dvh";
                el.style.left = "0";
                el.style.top = "0";
                el.style.position = "fixed";
                if (el.tagName === 'VIDEO') {
                    el.style.objectFit = "cover";
                }
            });

        }, 500);
    };

</script>

<script src="common.js"></script>

</body>
</html>
