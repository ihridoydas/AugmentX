<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AugmentX AR</title>

    <style>
        html, body {
            width: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent !important;
            left: 0;
            top: 0;
        }

        #ComposeTarget {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;

            z-index: 10;
            pointer-events: none;

            background: transparent !important;
            transition: opacity 0.4s ease-in-out;
        }

        #ComposeTarget > * {
            pointer-events: auto;
        }

        /* When AR is active, hide UI by default to show camera */
        body.ar-active #ComposeTarget {
            opacity: 0;
            pointer-events: none;
        }

        /* When user wants to see UI during AR */
        body.ar-active.show-ui #ComposeTarget {
            opacity: 1;
            pointer-events: auto;
        }

        #ARContainer, #ViewerContainer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            width: 100%;
            height: 100dvh;

            z-index: 1;
            display: none;
            overflow: hidden;
            background: transparent;
        }

        #ViewerContainer:not(:empty) {
            display: block !important;
        }

        #LogContainer {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;
            max-height: 80px;

            background: rgba(0,0,0,0.5);
            color: #0f0;

            font-family: monospace;
            font-size: 10px;

            overflow-y: auto;

            z-index: 1000;

            pointer-events: none;

            padding: 5px;
            box-sizing: border-box;
        }

        #BackButton {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9999;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: rgba(0,0,0,0.55);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            display: none;
        }

        /* Background Camera Feed ONLY */
        video:not(#arVideo) {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            object-fit: cover !important;
            z-index: 0 !important;
            margin: 0 !important;
        }

        /* AR Content Video */
        #arVideo {
            display: none;
        }

        canvas.a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            z-index: 1 !important;
            margin: 0 !important;
        }
    </style>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>

<button id="BackButton" onclick="onBackPressed()">
    ← Back
</button>

<div id="LogContainer">
    Initializing...<br>
</div>

<div id="ARContainer"></div>
<div id="ViewerContainer"></div>
<div id="ComposeTarget"></div>

<script>
    // GLOBAL ERROR SUPPRESSOR
    let isStoppingAR = false;
    window.addEventListener('error', (e) => {
        if (isStoppingAR) {
            e.preventDefault();
            e.stopImmediatePropagation();
            return true;
        }
    }, true);

    function screenLog(msg) {
        try {
            const log = document.getElementById("LogContainer");
            if (!log) return;
            log.innerHTML += "> " + msg + "<br>";
            log.scrollTop = log.scrollHeight;
            console.log("LOG: " + msg);
        } catch (e) {
            console.error("screenLog error:", e);
        }
    }

    screenLog("V58 Initializing...");

    function onBackPressed() {
        screenLog("Back pressed");
        if (document.body.classList.contains('ar-active')) {
            document.body.classList.add('show-ui');
        }
        try {
            if (window.kmpBridge && typeof window.kmpBridge.onBackPressed === "function") {
                window.kmpBridge.onBackPressed();
                return;
            }
            if (history.length > 1) {
                history.back();
            }
        } catch (e) {
            console.error("onBackPressed error:", e);
        }
    }

    let arIntervalId = null;

    window.stopARSession = function() {
        if (isStoppingAR) return;
        isStoppingAR = true;
        screenLog("Stopping AR (V58)...");

        if (arIntervalId) {
            clearInterval(arIntervalId);
            arIntervalId = null;
        }

        try {
            document.body.classList.remove("ar-active");
            document.body.classList.remove("show-ui");
            const backBtn = document.getElementById("BackButton");
            if (backBtn) backBtn.style.display = "none";

            // 1. Stop MindAR System
            const container = document.getElementById("ARContainer");
            if (container) {
                const scene = container.querySelector('a-scene');
                if (scene) {
                    try {
                        screenLog("Stopping Scene...");
                        if (scene.systems && scene.systems['mindar-image-system']) {
                            scene.systems['mindar-image-system'].stop();
                        }
                        scene.pause();
                        if (scene.parentNode) scene.parentNode.removeChild(scene);
                    } catch(e) {}
                }
                container.innerHTML = "";
            }

            // 2. Stop camera
            const allVideos = document.querySelectorAll('video');
            for (let i = 0; i < allVideos.length; i++) {
                try {
                    const v = allVideos[i];
                    if (v.srcObject) {
                        v.srcObject.getTracks().forEach(t => t.stop());
                        v.srcObject = null;
                    }
                    v.pause();
                    v.remove();
                } catch(e) {}
            }

            // 3. Clear A-Frame Globals
            if (window.AFRAME) {
                if (window.AFRAME.scenes) {
                    window.AFRAME.scenes.forEach(s => {
                        try { if(s.parentNode) s.parentNode.removeChild(s); } catch(e) {}
                    });
                    window.AFRAME.scenes = [];
                }
            }

            // 4. Remove all leftovers
            const garbage = document.querySelectorAll('.a-canvas, .mindar-ui-overlay, .mindar-ui-loading, video, canvas, .a-loader-title, .a-enter-vr, .a-enter-ar');
            garbage.forEach(el => { try { el.remove(); } catch(e) {} });

            setTimeout(() => {
                isStoppingAR = false;
                screenLog("Cleanup done (V58).");
            }, 1200);

        } catch (e) {
            isStoppingAR = false;
            console.error("Stop error:", e);
        }
    };

    window.startARSession = function(mindFile, htmlContent) {
        if (isStoppingAR) {
            screenLog("Waiting for cleanup...");
            setTimeout(() => window.startARSession(mindFile, htmlContent), 500);
            return;
        }

        const timestamp = Date.now();
        // Use path without origin and add cache buster
        const fullMindPath = mindFile + "?t=" + timestamp;
        screenLog("Starting AR (V58): " + fullMindPath);

        try {
            document.body.classList.add("ar-active");
            document.body.classList.remove("show-ui");
            const backBtn = document.getElementById("BackButton");
            if (backBtn) backBtn.style.display = "block";

            const container = document.getElementById("ARContainer");
            if (container) {
                container.style.display = "block";

                // 1. Process HTML
                let finalHtml = htmlContent;

                // Force mindar settings and add cache buster
                finalHtml = finalHtml.replace(/mindar-image="[^"]+"/, 'mindar-image="imageTargetSrc: ' + fullMindPath + '; autoStart: true; uiScanning: yes; uiLoading: yes;"');

                // Add timestamp to any src="..." that looks like an asset (not starting with #)
                finalHtml = finalHtml.replace(/src="([^#][^"]+)"/g, 'src="$1?t=' + timestamp + '"');

                // Add Lights
                const lights = `
                    <a-entity light="type: ambient; color: #BBB; intensity: 1.5"></a-entity>
                    <a-entity light="type: directional; color: #FFF; intensity: 1.0" position="-1 2 4"></a-entity>
                `;
                finalHtml = finalHtml.replace("</a-scene>", lights + "</a-scene>");

                screenLog("Injecting HTML...");
                container.innerHTML = finalHtml;

                const sceneEl = container.querySelector('a-scene');
                if (sceneEl) {
                    sceneEl.addEventListener('arReady', () => {
                        screenLog("MindAR Ready (V58)");
                        setTimeout(() => window.dispatchEvent(new Event('resize')), 500);
                    });

                    sceneEl.addEventListener('targetFound', (e) => {
                        const idx = e.detail ? e.detail.targetIndex : 0;
                        screenLog("Target Found: " + idx);

                        const targets = sceneEl.querySelectorAll('[mindar-image-target]');
                        for (let i = 0; i < targets.length; i++) {
                            const t = targets[i];
                            const attrValue = t.getAttribute('mindar-image-target');
                            if (attrValue) {
                                // Safe check for targetIndex
                                const attrStr = String(attrValue).replace(/\s/g, '');
                                if (attrStr.indexOf("targetIndex:" + idx) !== -1) {
                                    screenLog("Showing entity " + idx);
                                    t.setAttribute('visible', 'true');
                                    const models = t.querySelectorAll('a-gltf-model');
                                    for (let j = 0; j < models.length; j++) {
                                        models[j].setAttribute('visible', 'true');
                                    }
                                }
                            }
                        }

                        const video = document.getElementById("arVideo");
                        if (video) video.play().catch(e => {});
                    });

                    sceneEl.addEventListener('targetLost', () => {
                        screenLog("Target Lost");
                        const video = document.getElementById("arVideo");
                        if (video) video.pause();
                    });

                    const models = container.querySelectorAll('a-gltf-model');
                    models.forEach((m, idx) => {
                        m.addEventListener('model-loaded', () => {
                            screenLog("Model " + idx + " Loaded");
                            m.setAttribute('visible', 'true');
                        });
                        m.addEventListener('model-error', (e) => screenLog("Model Load Error"));
                    });

                    sceneEl.addEventListener('loaded', () => {
                        screenLog("A-Frame Loaded");
                        setTimeout(() => {
                            if (sceneEl.systems && sceneEl.systems['mindar-image-system']) {
                                const system = sceneEl.systems['mindar-image-system'];
                                screenLog("System Scanning: " + system.isScanning);
                                if (!system.isScanning) {
                                    screenLog("Forcing start...");
                                    system.start();
                                }
                            }
                        }, 2500);
                    });
                }
            }
        } catch (e) {
            screenLog("Start Error: " + e.message);
        }








        if (arIntervalId) clearInterval(arIntervalId);
        arIntervalId = setInterval(() => {
            const composeCanvases = document.querySelectorAll('#ComposeTarget canvas');
            for (let i = 0; i < composeCanvases.length; i++) {
                try { composeCanvases[i].style.backgroundColor = "transparent"; } catch(e) {}
            }

            if (document.body.classList.contains('ar-active')) {
                const bgVideos = document.querySelectorAll('video:not(#arVideo)');
                for (let i = 0; i < bgVideos.length; i++) {
                    try {
                        const v = bgVideos[i];
                        v.style.width = "100vw"; v.style.height = "100dvh";
                        v.style.left = "0"; v.style.top = "0";
                        v.style.position = "fixed"; v.style.objectFit = "cover";
                    } catch(e) {}
                }
            }
        }, 500);
    };

    document.addEventListener('click', (e) => {
        if (e.target.id === "BackButton") return;
        if (document.body.classList.contains('ar-active')) {
            if (e.target.closest('#ComposeTarget > *')) return;
            document.body.classList.toggle('show-ui');
            screenLog(document.body.classList.contains('show-ui') ? "UI Shown" : "UI Hidden");
        }
    });
</script>
<script src="common.js"></script>
</body>
</html>
