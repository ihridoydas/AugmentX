<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AugmentX AR</title>

    <style>
        html, body {
            width: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent !important;
            left: 0;
            top: 0;
        }

        #ComposeTarget {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;

            z-index: 10;
            pointer-events: none;

            background: transparent !important;
            transition: opacity 0.4s ease-in-out;
        }

        #ComposeTarget > * {
            pointer-events: auto;
        }

        /* When AR is active, hide UI by default to show camera */
        body.ar-active #ComposeTarget {
            opacity: 0;
            pointer-events: none;
        }

        /* When user wants to see UI during AR */
        body.ar-active.show-ui #ComposeTarget {
            opacity: 1;
            pointer-events: auto;
        }

        #ARContainer, #ViewerContainer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            width: 100%;
            height: 100dvh;

            z-index: 1;
            display: none;
            overflow: hidden;
            background: transparent;
        }

        #ViewerContainer:not(:empty) {
            display: block !important;
        }

        #LogContainer {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;
            max-height: 80px;

            background: rgba(0,0,0,0.5);
            color: #0f0;

            font-family: monospace;
            font-size: 10px;

            overflow-y: auto;

            z-index: 1000;

            pointer-events: none;

            padding: 5px;
            box-sizing: border-box;
        }

        #BackButton {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9999;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: rgba(0,0,0,0.55);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            display: none;
        }

        /* Background Camera Feed ONLY */
        video:not(#arVideo) {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            object-fit: cover !important;
            z-index: 0 !important;
            margin: 0 !important;
        }

        /* AR Content Video */
        #arVideo {
            display: none;
        }

        canvas.a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            z-index: 1 !important;
            margin: 0 !important;
        }
    </style>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js" crossorigin="anonymous"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>

<button id="BackButton" onclick="onBackPressed()">
    ← Back
</button>

<div id="LogContainer">
    Initializing...<br>
</div>

<div id="ARContainer"></div>
<div id="ViewerContainer"></div>
<div id="ComposeTarget"></div>

<script>
    // GLOBAL ERROR SUPPRESSOR - Added at the very top
    let isStoppingAR = false;
    window.addEventListener('error', (e) => {
        if (isStoppingAR) {
            console.log("Suppressed background error during AR cleanup");
            e.preventDefault();
            e.stopImmediatePropagation();
            return true;
        }
    }, true);

    function screenLog(msg) {
        try {
            const log = document.getElementById("LogContainer");
            if (!log) return;
            log.innerHTML += "> " + msg + "<br>";
            log.scrollTop = log.scrollHeight;
            console.log("LOG: " + msg);
        } catch (e) {
            console.error("screenLog error:", e);
        }
    }

    screenLog("V47 Initializing...");

    function onBackPressed() {
        screenLog("Back pressed");
        if (document.body.classList.contains('ar-active')) {
            document.body.classList.add('show-ui');
        }
        try {
            if (window.kmpBridge && typeof window.kmpBridge.onBackPressed === "function") {
                window.kmpBridge.onBackPressed();
                return;
            }
            if (history.length > 1) {
                history.back();
            }
        } catch (e) {
            console.error("onBackPressed error:", e);
        }
    }

    let arIntervalId = null;

    window.stopARSession = function() {
        if (isStoppingAR) return;
        isStoppingAR = true;
        screenLog("Stopping AR (V47)...");

        try {
            if (arIntervalId) {
                clearInterval(arIntervalId);
                arIntervalId = null;
            }

            document.body.classList.remove("ar-active");
            document.body.classList.remove("show-ui");
            const backBtn = document.getElementById("BackButton");
            if (backBtn) backBtn.style.display = "none";

            // 1. Stop all videos and camera streams immediately
            const videos = document.getElementsByTagName('video');
            for (let i = 0; i < videos.length; i++) {
                try {
                    const v = videos[i];
                    if (v.srcObject) {
                        const tracks = v.srcObject.getTracks();
                        for(let j=0; j<tracks.length; j++) {
                            try { tracks[j].stop(); } catch(e) {}
                        }
                        v.srcObject = null;
                    }
                    v.pause();
                } catch(e) {}
            }

            // 2. Hide containers.
            // WE DO NOT CLEAR innerHTML HERE ANYMORE to avoid the "Back" crash.
            const containers = [document.getElementById("ARContainer"), document.getElementById("ViewerContainer")];
            for (let i = 0; i < containers.length; i++) {
                if (containers[i]) {
                    containers[i].style.display = "none";
                    // Gently pause the scene if it exists
                    try {
                        const scene = containers[i].querySelector('a-scene');
                        if (scene) scene.pause();
                    } catch(e) {}
                }
            }

            // 3. Hide overlays
            const overlays = document.querySelectorAll('.mindar-ui-overlay, .mindar-ui-loading, .a-canvas');
            for (let i = 0; i < overlays.length; i++) {
                try { overlays[i].style.display = 'none'; } catch(e) {}
            }

            // 4. Delay clearing DOM until well after the transition
            setTimeout(() => {
                try {
                    screenLog("Performing deferred cleanup...");
                    for (let i = 0; i < containers.length; i++) {
                        const c = containers[i];
                        if (c) {
                            // Clear by setting a single space - sometimes safer than empty string
                            c.innerHTML = " ";
                        }
                    }
                    const bodyCanvases = document.querySelectorAll('body > .a-canvas');
                    for (let i = 0; i < bodyCanvases.length; i++) {
                        try { bodyCanvases[i].parentNode.removeChild(bodyCanvases[i]); } catch(e) {}
                    }
                } catch(e) {}

                isStoppingAR = false;
                screenLog("Cleanup done (V47).");
            }, 3000); // 3 seconds delay - plenty of time to be away from the screen

        } catch (e) {
            isStoppingAR = false;
            console.error("Cleanup error:", e);
        }
    };

    window.startARSession = function(mindFile, htmlContent) {
        // If we are still "stopping" (in the 3s window), we force clear now
        if (isStoppingAR) {
            screenLog("Force clearing for new session...");
            const containers = [document.getElementById("ARContainer"), document.getElementById("ViewerContainer")];
            for (let i = 0; i < containers.length; i++) {
                if(containers[i]) containers[i].innerHTML = "";
            }
            isStoppingAR = false;
        }

        screenLog("Starting AR (V47): " + mindFile);

        try {
            const containers = [document.getElementById("ARContainer"), document.getElementById("ViewerContainer")];
            for (let i = 0; i < containers.length; i++) {
                if(containers[i]) {
                    try {
                        containers[i].innerHTML = "";
                    } catch(e) {}
                }
            }
        } catch(e) {}

        try {
            document.body.classList.add("ar-active");
            document.body.classList.remove("show-ui");
            const backBtn = document.getElementById("BackButton");
            if (backBtn) backBtn.style.display = "block";

            const container = document.getElementById("ARContainer");
            if (container) {
                container.style.display = "block";
                container.innerHTML = htmlContent;

                const sceneEl = container.querySelector('a-scene');
                if (sceneEl) {
                    sceneEl.addEventListener('arReady', () => {
                        screenLog("MindAR Ready");
                        setTimeout(() => window.dispatchEvent(new Event('resize')), 100);
                    });
                    sceneEl.addEventListener('arError', (e) => {
                        screenLog("AR Error: " + (e.detail ? e.detail.error : "unknown"));
                    });
                    sceneEl.addEventListener('targetFound', (e) => {
                        screenLog("Found Target: " + (e.detail ? e.detail.targetIndex : "0"));
                        const video = document.getElementById("arVideo");
                        if (video) video.play().catch(err => screenLog("Play failed: " + err.message));
                    });
                    sceneEl.addEventListener('targetLost', () => {
                        screenLog("Lost Target");
                        const video = document.getElementById("arVideo");
                        if (video) video.pause();
                    });
                }
            }
        } catch (e) {
            screenLog("Start Error: " + e.message);
        }

        if (arIntervalId) clearInterval(arIntervalId);
        arIntervalId = setInterval(() => {
            const composeCanvases = document.querySelectorAll('#ComposeTarget canvas');
            if (composeCanvases.length > 0) {
                for (let i = 0; i < composeCanvases.length; i++) {
                    try { composeCanvases[i].style.backgroundColor = "transparent"; } catch(e) {}
                }
            }

            if (document.body.classList.contains('ar-active')) {
                const bgVideos = document.querySelectorAll('video:not(#arVideo)');
                for (let i = 0; i < bgVideos.length; i++) {
                    try {
                        const v = bgVideos[i];
                        v.style.width = "100vw"; v.style.height = "100dvh";
                        v.style.left = "0"; v.style.top = "0";
                        v.style.position = "fixed"; v.style.objectFit = "cover";
                    } catch(e) {}
                }
            }
        }, 500);
    };

    document.addEventListener('click', (e) => {
        if (e.target.id === "BackButton") return;
        if (document.body.classList.contains('ar-active')) {
            if (e.target.closest('#ComposeTarget > *')) return;
            document.body.classList.toggle('show-ui');
            screenLog(document.body.classList.contains('show-ui') ? "UI Shown" : "UI Hidden");
        }
    });
</script>
<script src="common.js"></script>
</body>
</html>
