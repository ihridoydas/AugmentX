<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AugmentX AR</title>

    <style>
        html, body {
            width: 100%;
            height: 100dvh;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent !important;
            left: 0;
            top: 0;
        }

        #ComposeTarget {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;

            z-index: 10;
            pointer-events: none;

            background: transparent !important;
            transition: opacity 0.4s ease-in-out;
        }

        #ComposeTarget > * {
            pointer-events: auto;
        }

        /* When AR is active, hide UI by default to show camera */
        body.ar-active #ComposeTarget {
            opacity: 0;
            pointer-events: none;
        }

        /* When user wants to see UI during AR */
        body.ar-active.show-ui #ComposeTarget {
            opacity: 1;
            pointer-events: auto;
        }

        #ARContainer, #ViewerContainer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;

            width: 100%;
            height: 100dvh;

            z-index: 1;
            display: none;
            overflow: hidden;
            background: transparent;
        }

        #ViewerContainer:not(:empty) {
            display: block !important;
        }

        #LogContainer {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;
            max-height: 80px;

            background: rgba(0,0,0,0.5);
            color: #0f0;

            font-family: monospace;
            font-size: 10px;

            overflow-y: auto;

            z-index: 1000;

            pointer-events: none;

            padding: 5px;
            box-sizing: border-box;
        }

        #BackButton {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 9999;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: rgba(0,0,0,0.55);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            pointer-events: auto;
            display: none;
        }

        /* Background Camera Feed ONLY */
        video:not(#arVideo) {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            object-fit: cover !important;
            z-index: 0 !important;
            margin: 0 !important;
        }

        /* AR Content Video */
        #arVideo {
            display: none;
        }

        canvas.a-canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100dvh !important;
            z-index: 1 !important;
            margin: 0 !important;
        }
    </style>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>

<body>

<button id="BackButton" onclick="onBackPressed()">
    ← Back
</button>

<div id="LogContainer">
    Initializing...<br>
</div>

<div id="ARContainer"></div>
<div id="ViewerContainer"></div>
<div id="ComposeTarget"></div>

<script>
    // GLOBAL ERROR SUPPRESSOR
    let isStoppingAR = false;
    window.addEventListener('error', (e) => {
        if (isStoppingAR) {
            e.preventDefault();
            e.stopImmediatePropagation();
            return true;
        }
    }, true);

    function screenLog(msg) {
        try {
            const log = document.getElementById("LogContainer");
            if (!log) return;
            log.innerHTML += "> " + msg + "<br>";
            log.scrollTop = log.scrollHeight;
            console.log("LOG: " + msg);
        } catch (e) {
            console.error("screenLog error:", e);
        }
    }

    screenLog("V65 Initializing (Hard Reset on Back)...");

    function onBackPressed() {
        screenLog("Back pressed - Reloading Browser...");
        try {
            // Stop AR session if active
            if (window.stopARSession) window.stopARSession();

            // Wait briefly for tracks to stop then hard reload to origin
            setTimeout(() => {
                window.location.href = window.location.origin;
            }, 400);
        } catch (e) {
            window.location.href = window.location.origin;
        }
    }

    let arIntervalId = null;

    window.stopARSession = function() {
        if (isStoppingAR) return;
        isStoppingAR = true;
        screenLog("Stopping AR (V65)...");

        if (arIntervalId) {
            clearInterval(arIntervalId);
            arIntervalId = null;
        }

        try {
            document.body.classList.remove("ar-active");
            document.body.classList.remove("show-ui");
            const backBtn = document.getElementById("BackButton");
            if (backBtn) backBtn.style.display = "none";

            // 1. Stop all video tracks
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                try {
                    if (v.srcObject) {
                        v.srcObject.getTracks().forEach(t => t.stop());
                        v.srcObject = null;
                    }
                    v.pause();
                    v.removeAttribute('src');
                    v.load();
                    v.remove();
                } catch(e) {}
            });

            // 2. Stop MindAR System
            const container = document.getElementById("ARContainer");
            if (container) {
                const scene = container.querySelector('a-scene');
                if (scene) {
                    try {
                        if (scene.systems && scene.systems['mindar-image-system']) {
                            scene.systems['mindar-image-system'].stop();
                        }
                        scene.pause();
                        if (scene.renderer) scene.renderer.dispose();
                        if (window.AFRAME) window.AFRAME.scenes = [];
                        scene.parentNode.removeChild(scene);
                    } catch(e) {}
                }
                container.innerHTML = "";
            }

            // 3. Clear Caches
            if (window.THREE && window.THREE.Cache) window.THREE.Cache.clear();

            // 4. Remove all leftovers
            const garbage = document.querySelectorAll('.a-canvas, .mindar-ui-overlay, .mindar-ui-loading, video, canvas, .a-loader-title, .a-enter-vr, .a-enter-ar');
            garbage.forEach(el => { try { el.remove(); } catch(e) {} });

            setTimeout(() => {
                isStoppingAR = false;
                screenLog("Cleanup done (V65).");
            }, 600);

        } catch (e) {
            isStoppingAR = false;
            console.error("Stop error:", e);
        }
    };

    window.startARSession = function(mindFile, htmlContent) {
        if (isStoppingAR) {
            screenLog("Waiting for cleanup...");
            setTimeout(() => window.startARSession(mindFile, htmlContent), 400);
            return;
        }

        const timestamp = Date.now();
        const fullMindPath = mindFile + (mindFile.includes('?') ? '&' : '?') + "t=" + timestamp;
        screenLog("Starting AR (V65): " + fullMindPath);

        try {
            document.body.classList.add("ar-active");
            document.body.classList.remove("show-ui");
            const backBtn = document.getElementById("BackButton");
            if (backBtn) backBtn.style.display = "block";

            const container = document.getElementById("ARContainer");
            if (container) {
                container.style.display = "block";

                // 1. Prepare HTML with unique IDs
                let finalHtml = htmlContent;
                finalHtml = finalHtml.replace('<a-scene', '<a-scene id="scene-' + timestamp + '"');
                finalHtml = finalHtml.replace(/id="targetModel(\d+)"/g, 'id="targetModel$1-' + timestamp + '"');
                finalHtml = finalHtml.replace(/src="#targetModel(\d+)"/g, 'src="#targetModel$1-' + timestamp + '"');
                finalHtml = finalHtml.replace(/mindar-image="[^"]+"/, 'mindar-image="imageTargetSrc: ' + fullMindPath + '; autoStart: true; uiScanning: yes; uiLoading: yes;"');
                finalHtml = finalHtml.replace(/src="([^#][^"]+)"/g, 'src="$1?t=' + timestamp + '"');

                const lights = `
                    <a-entity light="type: ambient; color: #BBB; intensity: 1.5"></a-entity>
                    <a-entity light="type: directional; color: #FFF; intensity: 1.0" position="-1 2 4"></a-entity>
                `;
                finalHtml = finalHtml.replace("</a-scene>", lights + "</a-scene>");

                screenLog("Injecting New Scene...");
                container.innerHTML = finalHtml;

                const sceneEl = container.querySelector('a-scene');
                if (sceneEl) {
                    sceneEl.addEventListener('arReady', () => {
                        screenLog("MindAR Ready (V65)");
                        window.dispatchEvent(new Event('resize'));
                    });

                    sceneEl.addEventListener('targetFound', (e) => {
                        const idx = (e.detail && e.detail.targetIndex !== undefined) ? e.detail.targetIndex : 0;
                        screenLog("Target Found: " + idx);
                        const targets = sceneEl.querySelectorAll('[mindar-image-target]');
                        targets.forEach(t => {
                            const attr = t.getAttribute('mindar-image-target');
                            let isMatch = false;
                            if (typeof attr === 'string') {
                                isMatch = attr.replace(/\s/g, '').includes("targetIndex:" + idx);
                            } else if (attr && typeof attr.targetIndex !== 'undefined') {
                                isMatch = (attr.targetIndex == idx);
                            }

                            if (isMatch) {
                                screenLog("Showing entity " + idx);
                                t.setAttribute('visible', 'true');
                                t.querySelectorAll('*').forEach(child => child.setAttribute('visible', 'true'));
                            }
                        });
                    });

                    sceneEl.addEventListener('targetLost', (e) => {
                        const idx = (e.detail && e.detail.targetIndex !== undefined) ? e.detail.targetIndex : 0;
                        screenLog("Target Lost: " + idx);
                        const targets = sceneEl.querySelectorAll('[mindar-image-target]');
                        targets.forEach(t => {
                            const attr = t.getAttribute('mindar-image-target');
                            let isMatch = false;
                            if (typeof attr === 'string') {
                                isMatch = attr.replace(/\s/g, '').includes("targetIndex:" + idx);
                            } else if (attr && typeof attr.targetIndex !== 'undefined') {
                                isMatch = (attr.targetIndex == idx);
                            }
                            if (isMatch) t.setAttribute('visible', 'false');
                        });
                        const video = document.getElementById("arVideo");
                        if (video) video.pause();
                    });

                    sceneEl.addEventListener('loaded', () => {
                        screenLog("A-Frame Loaded");
                        setTimeout(() => {
                            const system = sceneEl.systems && sceneEl.systems['mindar-image-system'];
                            if (system) {
                                system.start();
                                screenLog("Scanning Started");
                            }
                        }, 1000);
                    });
                }
            }
        } catch (e) {
            screenLog("Start Error: " + e.message);
        }

        if (arIntervalId) clearInterval(arIntervalId);
        arIntervalId = setInterval(() => {
            if (document.body.classList.contains('ar-active')) {
                const bgVideos = document.querySelectorAll('video:not(#arVideo)');
                bgVideos.forEach(v => {
                    v.style.width = "100vw"; v.style.height = "100dvh";
                    v.style.position = "fixed"; v.style.objectFit = "cover";
                    v.style.top = "0"; v.style.left = "0";
                });
            }
        }, 500);
    };

    document.addEventListener('click', (e) => {
        if (e.target.id === "BackButton") return;
        if (document.body.classList.contains('ar-active')) {
            if (e.target.closest('#ComposeTarget > *')) return;
            document.body.classList.toggle('show-ui');
        }
    });
</script>
<script src="common.js"></script>
</body>
</html>
