<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AugmentX</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&family=Noto+Sans+Bengali&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script>
        // Apply saved language before Compose starts
        (function() {
            var savedLang = localStorage.getItem("app_lang");
            if (savedLang !== null && savedLang !== "") {
                document.documentElement.setAttribute("lang", savedLang);
            } else {
                document.documentElement.setAttribute("lang", "en");
            }
        })();
    </script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Noto Sans JP', 'Noto Sans Bengali', sans-serif;
            background-color: #121212; /* Darker background */
        }
        #ComposeTarget {
            width: 100%;
            height: 100%;
            position: relative;
            z-index: 10;
            pointer-events: none;
            background: transparent !important;
        }
        #ComposeTarget > * {
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="ComposeTarget"></div>
    <script src="common.js"></script>
</body>
</html>
